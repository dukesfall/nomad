<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nomad Capital Ventures</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    height:100%;
}

body{
    overflow:hidden;
    background:#000;
    color:#fff;
    font-family:Georgia, "Times New Roman", serif;
}

/* Background Video */
video{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    transform:scale(1.5); /* Increase to 1.75 if bars remain */
    transform-origin:center center;
    z-index:-2;
}

/* Dark Overlay */
.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.45);
    z-index:-1;
}

/* Center Logo */
main{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.logo{
    text-align:center;
    font-size:clamp(2rem,5vw,4.5rem);
    font-weight:400;
    letter-spacing:-0.05em;
    text-shadow:0 2px 20px rgba(0,0,0,.4);
}

/* Footer */
footer{
    position:fixed;
    bottom:0;
    width:100%;
    text-align:center;
    padding:24px;
    font-size:12px;
    color:rgba(255,255,255,.7);
    font-family:Arial, Helvetica, sans-serif;
}
</style>
</head>
<body>

<video autoplay muted loop playsinline>
    <source src="https://twinfallscounty.org/wp-content/uploads/2018/11/4K-Drone-Footage-of-Perrine-Bridge-Shoshone-Waterfalls-Twin-Falls-Idaho.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<main>
    <div class="logo">
        Nomad Capital Ventures
    </div>
</main>

<footer>
    © 2026 Nomad Capital Ventures
</footer>

</body>
</html>
