<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nomad Capital Ventures</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

body{
    font-family:Georgia, "Times New Roman", serif;
    color:#fff;
}

/* Background Video */
video{
    position:fixed;
    top:50%;
    left:50%;
    min-width:100%;
    min-height:100%;
    width:auto;
    height:auto;
    transform:translate(-50%, -50%) scale(1.35);
    object-fit:cover;
    z-index:-2;
}

/* Dark overlay for readability */
.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.35);
    z-index:-1;
}

/* Center logo */
main{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.logo{
    font-size:clamp(2.25rem,5vw,4.5rem);
    font-weight:400;
    letter-spacing:-0.05em;
    text-align:center;
    text-shadow:0 4px 30px rgba(0,0,0,.35);
}

/* Footer */
footer{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    text-align:center;
    padding:24px;
    font-size:12px;
    color:rgba(255,255,255,.75);
    font-family:Arial, Helvetica, sans-serif;
    letter-spacing:.05em;
}

/* Mobile */
@media (max-width:768px){

    video{
        transform:translate(-50%, -50%) scale(1.6);
    }

    .logo{
        font-size:clamp(2rem,9vw,3rem);
    }

    footer{
        padding:18px;
        font-size:11px;
    }
}
</style>
</head>
<body>

<video autoplay muted loop playsinline>
    <source src="https://twinfallscounty.org/wp-content/uploads/2018/11/4K-Drone-Footage-of-Perrine-Bridge-Shoshone-Waterfalls-Twin-Falls-Idaho.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<main>
    <div class="logo">
        Nomad Capital Ventures
    </div>
</main>

<footer>
    © 2026 Nomad Capital Ventures
</footer>

</body>
</html>
